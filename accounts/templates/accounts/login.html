{% extends "core/base.html" %}
{% block content %}
<h1>{{ title|default:"Login" }}</h1>
<form method="post">
    {% csrf_token %}
    <label>
        LRN
        <input type="text" name="lrn" required autofocus>
    </label>
    <label>
        Password
        <input type="password" name="password" required>
    </label>
    <button type="submit">Login</button>
</form>
{% endblock %}

{% extends "core/base.html" %}
{% load static %}
{% block html_attrs %} data-theme-locked="true"{% endblock %}
{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <div class="login-card__logo">B</div>
      <h1 class="login-card__title">Welcome to Booklat</h1>
      <p class="login-card__subtitle">Sign in to your school library account</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="lrn" class="form-label">LRN</label>
        <input type="text" name="lrn" id="lrn" class="form-input" required autofocus placeholder="Enter your LRN">
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-input" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn--primary btn--large btn--full">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}

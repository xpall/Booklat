{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Users</h1>

<div class="mb-4 flex gap-2" style="flex-wrap:wrap;">
  <a href="{% url 'accounts:user_create' %}" class="btn btn--primary btn--small">Create User</a>
  <a href="{% url 'accounts:user_import' %}" class="btn btn--secondary btn--small">Import CSV</a>
  <a href="{% url 'accounts:user_import_sample' %}" class="btn btn--outline btn--small">Download Sample CSV</a>
</div>

<div class="table-responsive">
  <table class="data-table">
    <thead>
      <tr>
        <th>LRN</th>
        <th>Name</th>
        <th>Role</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td><a href="{% url 'accounts:user_detail' u.pk %}">{{ u.lrn }}</a></td>
        <td>{{ u.get_full_name }}</td>
        <td>{{ u.role.name|default:"—" }}</td>
        <td>{{ u.get_status_display }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No users found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}

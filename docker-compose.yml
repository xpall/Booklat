services:
  web:
    build: .
    container_name: booklat-web
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/staticfiles:/app/staticfiles
    entrypoint: ["./entrypoint.sh"]

  db:
    image: postgres:16-alpine
    container_name: booklat-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-booklat}
      POSTGRES_USER: ${DB_USER:-booklat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booklat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booklat-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery_worker:
    build: .
    container_name: booklat-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=warning

  celery_beat:
    build: .
    container_name: booklat-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=warning --schedule=/tmp/celerybeat-schedule
    volumes:
      - celery-beat-data:/tmp

volumes:
  celery-beat-data:


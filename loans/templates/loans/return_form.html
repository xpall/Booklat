{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Return Book</h1>
<form method="post" style="max-width:28rem;">
  {% csrf_token %}
  <div class="form-group">
    <label for="copy" class="form-label">Borrowed Copy</label>
    <select name="copy" id="copy" class="form-input form-select" required>
      <option value="">Select copy...</option>
      {% for c in form.copy.field.queryset %}
      <option value="{{ c.pk }}">{{ c.copy_id }} — {{ c.book.title }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn--primary">Return Book</button>
</form>
{% endblock %}

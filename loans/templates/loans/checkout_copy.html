{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Checkout — Select Copy</h1>
<div class="card card--flat mb-4" style="padding:var(--space-4);">
  <span class="text-caption">User:</span>
  <span class="card__title" style="font-size:var(--font-size-small);">{{ user.get_full_name }} ({{ user.lrn }})</span>
</div>
<form method="post" style="max-width:28rem;">
  {% csrf_token %}
  <div class="form-group">
    <label for="copy" class="form-label">Available Copy</label>
    <select name="copy" id="copy" class="form-input form-select" required>
      <option value="">Select copy...</option>
      {% for c in form.copy.field.queryset %}
      <option value="{{ c.pk }}">{{ c.copy_id }} — {{ c.book.title }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn--primary">Next: Confirm</button>
</form>
{% endblock %}

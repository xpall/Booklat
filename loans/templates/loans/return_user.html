{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Return — Select User</h1>
<form method="post" style="max-width:28rem;">
  {% csrf_token %}
  <div class="form-group">
    <label for="user-search" class="form-label">User</label>
    <div class="user-search" data-search-url="{% url 'accounts:user_search_json' %}">
      <input type="text" id="user-search" class="form-input user-search__input" placeholder="Search by LRN or name..." autocomplete="off" required>
      {{ form.user }}
      <div class="user-search__dropdown"></div>
    </div>
    {% if form.user.errors %}<div class="form-error">{{ form.user.errors }}</div>{% endif %}
  </div>
  <button type="submit" class="btn btn--primary">Next: Select Copy</button>
</form>
{% endblock %}

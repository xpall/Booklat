{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Checkout — Select User</h1>
<form method="post" style="max-width:28rem;">
  {% csrf_token %}
  <div class="form-group">
    <label for="user" class="form-label">User</label>
    <select name="user" id="user" class="form-input form-select" required>
      <option value="">Select user...</option>
      {% for u in form.user.field.queryset %}
      <option value="{{ u.pk }}">{{ u.get_full_name }} ({{ u.lrn }})</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn--primary">Next: Select Copy</button>
</form>
{% endblock %}

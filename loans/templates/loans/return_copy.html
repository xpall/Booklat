{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Return — Select Copy</h1>
<div class="card card--flat mb-4" style="padding:var(--space-4);">
  <span class="text-caption">User:</span>
  <span class="card__title" style="font-size:var(--font-size-small);">{{ return_user.get_full_name }} ({{ return_user.lrn }})</span>
</div>
<form method="post" style="max-width:28rem;">
  {% csrf_token %}
  <div class="form-group">
    <label for="copy-search" class="form-label">Borrowed Copy</label>
    <div class="copy-search" data-search-url="{% url 'loans:borrowed_copy_search_json' %}?user_id={{ return_user.pk }}">
      <input type="text" id="copy-search" class="form-input copy-search__input" placeholder="Search by copy ID or book title..." autocomplete="off" required>
      {{ form.copy }}
      <div class="copy-search__dropdown"></div>
    </div>
    {% if form.copy.errors %}<div class="form-error">{{ form.copy.errors }}</div>{% endif %}
  </div>
  <button type="submit" class="btn btn--primary">Next: Confirm</button>
</form>
{% endblock %}

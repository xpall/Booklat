{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title mb-4">Edit Announcement</h1>

<form method="post" style="max-width:36rem;">
  {% csrf_token %}

  <div class="card mb-4">
    <div class="form-group">
      <label for="id_title" class="form-label">Title</label>
      <input type="text" name="title" id="id_title" class="form-input" maxlength="200" placeholder="Announcement title" value="{{ form.title.value|default:'' }}" required>
    </div>

    <div class="form-group">
      <label for="id_content" class="form-label">Content</label>
      <textarea name="content" id="id_content" class="form-input" rows="5" required>{{ form.content.value|default:'' }}</textarea>
    </div>
  </div>

  {% if form.errors %}
  <div class="mb-4">
    {% for field, error_list in form.errors.items %}
    {% for error in error_list %}
    <p class="form-error">{{ error }}</p>
    {% endfor %}
    {% endfor %}
  </div>
  {% endif %}

  <div class="flex gap-2">
    <button type="submit" class="btn btn--primary">Save Changes</button>
    <a href="{% url 'announcements:list' %}" class="btn btn--secondary">Cancel</a>
  </div>
</form>
{% endblock %}

services:
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: booklat-tunnel
    restart: unless-stopped
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    network_mode: service:web

  celery_worker:
    build: .
    container_name: booklat-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=warning

  celery_beat:
    build: .
    container_name: booklat-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=warning --schedule=/tmp/celerybeat-schedule
    volumes:
      - celery-beat-data:/tmp

volumes:
  celery-beat-data: